services:

  sql-server-db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sql-server-db

    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "Password123!"

    ports:
      - "1433:1433"

    volumes:
      - sqlvolume:/var/opt/mssql

  glms-backend-api:
    build:
      context: ./PROG7311POEAPI

    container_name: glms-backend-api

    depends_on:
      - sql-server-db

    environment:
      ASPNETCORE_ENVIRONMENT: Development

      ConnectionStrings__DefaultConnection: "Server=sql-server-db;Database=PROG7311POE1;User Id=sa;Password=Password123!;TrustServerCertificate=True;"

    ports:
      - "5001:8080"

  glms-frontend-web:
    build:
      context: ./Prog7311PoeTwo

    container_name: glms-frontend-web

    depends_on:
      - glms-backend-api

    environment:
      ASPNETCORE_ENVIRONMENT: Development

      ApiSettings__BaseUrl: "http://glms-backend-api:8080"

    ports:
      - "5000:80"

volumes:
  sqlvolume: